name: blocked-human-notify
on:
  issues:
    types: [labeled]
  pull_request_target:
    types: [labeled]
jobs:
  notify:
    if: contains(fromJSON('["blocked-human","blocked-manual"]'), github.event.label.name)
    runs-on: ubuntu-latest
    steps:
      - name: Comment mention
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const number = context.payload.issue?.number || context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner, repo, issue_number: number,
              body: `⚠️ @${GITHUB_ORG:-your-org} — this item was just labeled \`${context.payload.label.name}\` and requires human attention.`
            });
